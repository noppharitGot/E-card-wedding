<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #b39359;
            --cream: #fcfaf7;
            --deep-brown: #4a3b2b;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .joke-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .joke-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .joke-content {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
        }

        .joke-text {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .joke-type {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-get-joke {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-get-joke:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-get-joke:active {
            transform: translateY(0);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
            min-width: 120px;
        }

        .btn-copy:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 10px;
            margin: 20px 0;
            animation: slideIn 0.5s ease-out;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 10px;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .category-selector {
            margin: 20px 0;
        }

        .category-selector label {
            color: #666;
            font-weight: 600;
            margin-right: 10px;
        }

        .category-selector select {
            padding: 8px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .category-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .footer-text {
            color: #999;
            font-size: 0.85rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="joke-container">
        <h1 class="joke-title">😂 Joke Generator</h1>
        
        <div class="category-selector">
            <label for="category">Category:</label>
            <select id="category">
                <option value="Any">Any</option>
                <option value="General">General</option>
                <option value="Knock-Knock">Knock-Knock</option>
                <option value="Programming">Programming</option>
                <option value="Dark">Dark</option>
            </select>
        </div>

        <div id="jokeTypeDisplay" class="joke-type" style="display: none;"></div>

        <div class="joke-content">
            <p id="jokeDisplay" class="joke-text">Click the button to get a random joke!</p>
        </div>

        <div id="errorDisplay" class="error-message" style="display: none;"></div>

        <div class="button-group">
            <button class="btn-get-joke" onclick="fetchJoke()" id="getJokeBtn">
                Get a Joke
            </button>
            <button class="btn-copy" onclick="copyToClipboard()" id="copyBtn" style="display: none;">
                📋 Copy
            </button>
        </div>

        <div id="successMessage" class="success-message" style="display: none;">Copied to clipboard!</div>

        <p class="footer-text">Powered by <a href="https://v2.jokeapi.dev/" target="_blank" style="color: #667eea; text-decoration: none;">JokeAPI</a></p>
    </div>

    <script>
        let currentJoke = '';
        let currentSetup = '';
        let currentDelivery = '';

        async function fetchJoke() {
            const getJokeBtn = document.getElementById('getJokeBtn');
            const jokeDisplay = document.getElementById('jokeDisplay');
            const errorDisplay = document.getElementById('errorDisplay');
            const jokeTypeDisplay = document.getElementById('jokeTypeDisplay');
            const copyBtn = document.getElementById('copyBtn');
            const category = document.getElementById('category').value;

            // Show loading state
            getJokeBtn.innerHTML = '<span class="loading"></span> Loading...';
            getJokeBtn.disabled = true;
            errorDisplay.style.display = 'none';
            copyBtn.style.display = 'none';

            try {
                const categoryParam = category === 'Any' ? '' : `&category=${category}`;
                const response = await fetch(`https://v2.jokeapi.dev/joke/${category === 'Any' ? 'Any' : category}?type=single`);

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('Unable to fetch joke at the moment');
                }

                // Handle both single and two-part jokes
                if (data.type === 'single') {
                    currentJoke = data.joke;
                    jokeDisplay.innerHTML = `<span class="joke-text">${escapeHtml(data.joke)}</span>`;
                } else if (data.type === 'twopart') {
                    currentSetup = data.setup;
                    currentDelivery = data.delivery;
                    currentJoke = `${data.setup}\n\n${data.delivery}`;
                    jokeDisplay.innerHTML = `
                        <div class="joke-text">
                            <p>${escapeHtml(data.setup)}</p>
                            <p style="margin-top: 15px; font-weight: bold; color: #764ba2;">${escapeHtml(data.delivery)}</p>
                        </div>
                    `;
                }

                // Display joke category
                jokeTypeDisplay.textContent = `${data.category} Joke`;
                jokeTypeDisplay.style.display = 'inline-block';

                // Show copy button
                copyBtn.style.display = 'inline-block';

                errorDisplay.style.display = 'none';

            } catch (error) {
                errorDisplay.textContent = `❌ Error: ${error.message}. Please try again!`;
                errorDisplay.style.display = 'block';
                jokeDisplay.innerHTML = 'Click the button to get a random joke!';
                copyBtn.style.display = 'none';
            } finally {
                // Reset button state
                getJokeBtn.innerHTML = 'Get a Joke';
                getJokeBtn.disabled = false;
            }
        }

        function copyToClipboard() {
            if (currentJoke) {
                navigator.clipboard.writeText(currentJoke).then(() => {
                    const successMessage = document.getElementById('successMessage');
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy:', err);
                });
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Fetch a joke on page load
        window.addEventListener('load', () => {
            fetchJoke();
        });

        // Allow Enter key to fetch joke
        document.getElementById('category').addEventListener('change', fetchJoke);
    </script>
</body>
</html>
